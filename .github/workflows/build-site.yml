name: build-site

on:
  push:
    branches:
      - main

jobs:
  build-and-publish-site:
    runs-on: ubuntu-latest

    # Даем права на запись, чтобы пушить в ветку release
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Получаем всю историю, чтобы переключение веток работало корректно

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build MkDocs site
        run: |
          cd ./source
          echo "Начало сборки сайта"
          # Убедитесь, что mkdocs установлен (через requirements.txt или добавьте pip install mkdocs)
          mkdocs build -d ../docs
          echo "Сайт собран в папке ./docs"
          ls -la ../docs

      - name: Publish to release branch
        run: |
          # Настройка Git (обязательно для GitHub Actions)
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Создаем ветку release или переключаемся на нее
          git checkout -b release || git checkout release

          # Добавляем только собранную папку docs
          git add docs/

          # Проверяем, есть ли изменения, чтобы не упасть с ошибкой при пустом коммите
          if git diff --staged --quiet; then
            echo "Нет изменений для коммита"
          else
            git commit -m "feat: автоматическое обновление сайта"
            git push origin release --force
          fi