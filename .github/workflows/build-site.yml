name: Deploy MkDocs to Pages

on:
  push:
    branches:
      - main

# Даем права на деплой в GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Если mkdocs не в requirements.txt, раскомментируйте строку ниже:
          # pip install mkdocs-material

      - name: Build site
        run: |
          cd ./source
          # Собираем сайт в папку ../site (на уровень выше)
          mkdocs build -d ../site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Загружаем содержимое собранной папки
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4